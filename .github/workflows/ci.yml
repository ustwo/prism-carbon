name: Continuous Integration Running Tests

on:
  push:
    # branches:
    #   - dev
    #   - main

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: ./vsCodeExt
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: npm
        cache-dependency-path: ./vsCodeExt/package-lock.json
    - name: Cache VS Code Test instance
      id: cache-vscode
      uses: actions/cache@v4
      with:
        path: .vscode-test 
        key: ${{ runner.os }}-vscode-test-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-vscode-test-
    # - name: Cache node modules
    #   uses: actions/cache@v4
    #   env: 
    #     cache-name: cache-node-modules
    #     id: 
    #   with:
    #     path: ~/.npm
    #     key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
    #     restore-keys: |
    #       ${{ runner.os }}-build-${{ env.cache-name }}-
    #       ${{ runner.os }}-build-
    #       ${{ runner.os }}-
    # - if: ${{ steps.cache-npm.outputs.cache-hit != 'true' }}
    #   name: List the state of node modules
    #   continue-on-error: true
    #   run: npm list

    - run: npm ci

    - run: xvfb-run -a npm test
      if: runner.os == 'Linux'

    - run: npm test
      if: runner.os != 'Linux'