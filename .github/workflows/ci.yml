name: Continuous Integration Running Tests

on:
  push:
    # branches:
    #   - dev
      # - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: ./vsCodeExt
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: npm
        cache-dependency-path: ./vsCodeExt/package-lock.json
    - name: Cache VS Code Test instance
      id: cache-vscode
      uses: actions/cache@v4
      with:
        path: ./vsCodeExt/.vscode-test 
        key: ${{ runner.os }}-vscode-test-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-vscode-test-

    - run: npm ci

    - run: xvfb-run -a npm test
      if: runner.os == 'Linux'

    - run: npm test
      if: runner.os != 'Linux'